    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { initializeFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAU4q55DkXYlNmmGGMJVYXB6v2saQJTIaQ",
          authDomain: "ntag-card.firebaseapp.com",

          storageBucket: "ntag-card.firebasestorage.app",
          messagingSenderId: "163482004228",
          appId: "1:163482004228:web:e1280f3bff817d28a13e51"
        };

        const appId = "ss91827355-ntag-card"; 

        // 初始化狀態
        window.cardData = {
            avatarSource: 'ig',
            avatarCustomBase64: '',
            idLine: '',
            idIg: '',
            idFb: '',

            phone: '',

        };
        window.storedPassword = "";

        // 全域函數綁定
        window.triggerSaveFlow = triggerSaveFlow;
        window.verifyAndSavePassword = verifyAndSavePassword;
        window.confirmVerifyPassword = confirmVerifyPassword;
        window.triggerUnlockModal = triggerUnlockModal;
        window.compressAndUploadBackground = compressAndUploadBackground;
        window.compressAndUploadAvatar = compressAndUploadAvatar;
        window.handleAvatarSourceChange = handleAvatarSourceChange;
        window.updateSocialPreview = updateSocialPreview;
        window.hideCustomModal = hideCustomModal;

        let app, auth, db;

        // 逾時安全鎖
        const failsafeTimer = setTimeout(() => {
            document.getElementById('loading-overlay').classList.add('hidden');
            showToast("⚠️ 雲端資料庫連線逾時！請確認您已開啟 Firebase 匿名登入與資料庫讀寫權限。");
            switchToEditMode();
        }, 8500);

        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            
            // 強制開啟 HTTP Long-Polling 繞過 Brave、Safari 防護盾阻擋
            db = initializeFirestore(app, {
                experimentalForceLongPolling: true
            });

            window.db = db;
            window.doc = doc;
            window.setDoc = setDoc;

            initAuthAndFetch();
        } catch (e) {
            console.error("Firebase 初始化失敗:", e);
            clearTimeout(failsafeTimer);
            document.getElementById('loading-overlay').classList.add('hidden');
            showToast("Firebase 初始化異常，請檢查金鑰。");
            switchToEditMode();
        }

        // 安全認證與資料流加載
        async function initAuthAndFetch() {
            try {
                const userCredential = await signInAnonymously(auth);
                const user = userCredential.user;

                if (!user) throw new Error("匿名驗證失敗");

                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'cardData', 'mainProfile');
                
                onSnapshot(docRef, (docSnap) => {
                    clearTimeout(failsafeTimer);
                    document.getElementById('loading-overlay').classList.add('hidden');
                    
                    if (docSnap.exists()) {
                        window.cardData = docSnap.data();
                        window.storedPassword = window.cardData.adminPassword || "";
                        applyCardBackground(window.cardData.bgImage);
                        switchToViewMode();
                    } else {
                        switchToEditMode();
                    }
                }, (error) => {
                    console.error("Firestore 監聽失敗 (請確認 Rules 是否設為允許讀寫):", error);
                    clearTimeout(failsafeTimer);
                    document.getElementById('loading-overlay').classList.add('hidden');
                    showToast("讀取失敗！請至 Firebase 檢查 Rules 安全性規則。");
                    switchToEditMode();
                });

            } catch (err) {
                console.error("安全登入流程異常:", err);
                clearTimeout(failsafeTimer);
                document.getElementById('loading-overlay').classList.add('hidden');
                showToast("登入授權被拒！請確認 Firebase 控制台內已啟用匿名登入 (Anonymous)。");
                switchToEditMode();
            }
        }

        // ================= 圖片進階壓縮算法 (頭像 ~6KB / 背景 ~20KB) =================
        function compressImage(file, maxWidth, maxHeight, callback) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 使用 JPG 40% 品質極限壓縮，容量超小、完全不卡傳輸、手機解析度完全足夠
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.4);
                    callback(compressedDataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function compressAndUploadAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                // 大頭貼限制 100x100
                compressImage(file, 100, 100, function(compressedBase64) {
                    window.cardData.avatarCustomBase64 = compressedBase64;
                    document.getElementById('edit-avatar-preview').src = compressedBase64;
                    document.getElementById('avatar-status-text').innerText = "大頭照優化完成，待儲存";
                    document.getElementById('avatar-status-text').className = "text-[11px] text-blue-400 font-medium";
                });
            }
        }

        function compressAndUploadBackground(event) {
            const file = event.target.files[0];
            if (file) {
                // 背景圖最大限制 700px 寬，降低寫入容量負荷
                compressImage(file, 700, 700, function(compressedBase64) {
                    window.cardData.bgImage = compressedBase64;
                    applyCardBackground(compressedBase64);
                    showToast("自訂背景載入成功，請點擊下方『完成並同步』存檔！");
                });
            }
        }

        function applyCardBackground(bgData) {
            const bodyBg = document.getElementById('body-bg');
            if (bgData && bgData.startsWith('data:image')) {
                bodyBg.style.backgroundImage = `url('${bgData}')`;
            } else {
                bodyBg.style.backgroundImage = 'none';
            }
        }

        function handleAvatarSourceChange() {
            const source = document.getElementById('avatar-source-select').value;
            window.cardData.avatarSource = source;
            
            const uploadLabel = document.getElementById('avatar-upload-input-label');
            const statusLabel = document.getElementById('avatar-status-text');
            const previewImg = document.getElementById('edit-avatar-preview');

            if (source === 'upload') {
                uploadLabel.classList.remove('hidden');
                if (window.cardData.avatarCustomBase64) {
                    previewImg.src = window.cardData.avatarCustomBase64;
                    statusLabel.innerText = "已載入自訂大頭照";
                    statusLabel.className = "text-[11px] text-blue-400 font-medium";
                } else {
                    previewImg.src = 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80';
                    statusLabel.innerText = "尚未選擇自訂相片";
                    statusLabel.className = "text-[11px] text-white/30";
                }
            } else {
                uploadLabel.classList.add('hidden');
                syncSocialAvatarPreview(source);
            }
        }

        function syncSocialAvatarPreview(source) {
            const previewImg = document.getElementById('edit-avatar-preview');
            const statusLabel = document.getElementById('avatar-status-text');
            
            if (source === 'ig') {
                const igId = document.getElementById('edit-id-ig').value.trim();
                if (igId) {
                    const url = `https://unavatar.io/instagram/${igId}`;
                    previewImg.src = url;
                    statusLabel.innerText = `同步 Instagram: @${igId}`;
                    statusLabel.className = "text-[11px] text-pink-400 font-medium";
                } else {
                    previewImg.src = 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80';
                    statusLabel.innerText = "未設定 Instagram ID";
                    statusLabel.className = "text-[11px] text-white/30";
                }
            } else if (source === 'fb') {
                const fbId = document.getElementById('edit-id-fb').value.trim();
                if (fbId) {
                    const url = `https://unavatar.io/facebook/${fbId}`;
                    previewImg.src = url;
                    statusLabel.innerText = `同步 Facebook: ${fbId}`;
                    statusLabel.className = "text-[11px] text-blue-400 font-medium";
                } else {
                    previewImg.src = 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80';
                    statusLabel.innerText = "未設定 Facebook ID";
                    statusLabel.className = "text-[11px] text-white/30";
                }
            }
        }

        function updateSocialPreview() {
            const source = document.getElementById('avatar-source-select').value;
            if (source !== 'upload') {
                syncSocialAvatarPreview(source);
            }
        }

        // ================= 模式切換與渲染 =================
        function switchToViewMode() {
            document.getElementById('edit-mode-section').classList.add('hidden');
            document.getElementById('view-mode-section').classList.remove('hidden');
            document.getElementById('bg-upload-wrapper').classList.add('hidden');
            renderViewData();

            document.getElementById('view-mode-section').classList.add('hidden');
            document.getElementById('edit-mode-section').classList.remove('hidden');
            document.getElementById('bg-upload-wrapper').classList.remove('hidden');
            renderEditFields();
        }

        function renderViewData() {
            const avatarImg = document.getElementById('view-avatar');
            
            if (window.cardData.avatarSource === 'upload' && window.cardData.avatarCustomBase64) {
                avatarImg.src = window.cardData.avatarCustomBase64;
            } else if (window.cardData.avatarSource === 'ig' && window.cardData.idIg) {
                avatarImg.src = `https://unavatar.io/instagram/${window.cardData.idIg}`;
            } else if (window.cardData.avatarSource === 'fb' && window.cardData.idFb) {
                avatarImg.src = `https://unavatar.io/facebook/${window.cardData.idFb}`;
            } else {
                avatarImg.src = 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80';
            }
            
            avatarImg.onerror = function() {
                this.src = 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80';
            };

            document.getElementById('view-name').innerText = window.cardData.name || '未填寫姓名';
            document.getElementById('view-title').innerText = window.cardData.title || '專業職稱 / 經歷學位';
            document.getElementById('view-bio').innerText = window.cardData.bio || '點選最下方透明區域，輸入密碼進入管理修改名片。';

            const container = document.getElementById('view-links-container');
            container.innerHTML = '';

            const socialConfigs = [
                { id: window.cardData.idLine, name: 'LINE 官方諮詢', prefix: 'https://line.me/ti/p/~', icon: 'fab fa-line', color: '#00B900' },
                { id: window.cardData.idIg, name: 'Instagram 追蹤', prefix: 'https://instagram.com/', icon: 'fab fa-instagram', color: '#E1306C' },
                { id: window.cardData.idFb, name: 'Facebook 帳號', prefix: 'https://facebook.com/', icon: 'fab fa-facebook', color: '#1877F2' }
            ];

            socialConfigs.forEach(social => {
                if (social.id) {
                    const btn = document.createElement('a');
                    btn.href = `${social.prefix}${social.id}`;
                    btn.target = '_blank';
                    btn.className = 'w-full flex items-center justify-center gap-3 py-3.5 px-5 rounded-2xl bg-white/10 hover:bg-white/15 border border-white/10 transition-all duration-300 backdrop-blur-md shadow-md transform active:scale-95';
                    btn.innerHTML = `
                        <i class="${social.icon} text-xl" style="color: ${social.color}"></i>
                        <span class="font-semibold text-sm tracking-wider">${social.name}</span>
                    `;
                    container.appendChild(btn);
                }
            });

            if (window.cardData.phone || window.cardData.address) {
                const infoCard = document.createElement('div');
                infoCard.className = 'w-full bg-white/5 rounded-2xl p-4 border border-white/10 text-sm text-gray-300 mt-2 space-y-2.5';
                let rawHtml = '';
                if (window.cardData.phone) {
                    rawHtml += `<p class="flex items-center gap-3"><i class="fas fa-phone text-blue-400 w-5 text-center"></i> ${window.cardData.phone}</p>`;
                }
                if (window.cardData.address) {
                    rawHtml += `<p class="flex items-center gap-3"><i class="fas fa-map-marker-alt text-red-400 w-5 text-center"></i> ${window.cardData.address}</p>`;
                }
                infoCard.innerHTML = rawHtml;
                container.appendChild(infoCard);
            }
        }

        function renderEditFields() {
            document.getElementById('avatar-source-select').value = window.cardData.avatarSource || 'ig';
            document.getElementById('edit-id-line').value = window.cardData.idLine || '';
            document.getElementById('edit-id-ig').value = window.cardData.idIg || '';
            document.getElementById('edit-id-fb').value = window.cardData.idFb || '';
            document.getElementById('edit-name').value = window.cardData.name || '';
            document.getElementById('edit-title').value = window.cardData.title || '';
            document.getElementById('edit-bio').value = window.cardData.bio || '';
            document.getElementById('edit-phone').value = window.cardData.phone || '';
            document.getElementById('edit-address').value = window.cardData.address || '';
            
            handleAvatarSourceChange();
        }

        // ================= 儲存與驗證流程 =================
        function triggerSaveFlow() {
            window.cardData.avatarSource = document.getElementById('avatar-source-select').value;
            window.cardData.idLine = document.getElementById('edit-id-line').value.trim();
            window.cardData.idIg = document.getElementById('edit-id-ig').value.trim();
            window.cardData.idFb = document.getElementById('edit-id-fb').value.trim();
            window.cardData.name = document.getElementById('edit-name').value.trim();
            window.cardData.title = document.getElementById('edit-title').value.trim();
            window.cardData.bio = document.getElementById('edit-bio').value;
            window.cardData.phone = document.getElementById('edit-phone').value.trim();
            window.cardData.address = document.getElementById('edit-address').value.trim();

            if (window.storedPassword) {
                uploadCardToFirestore();
            } else {
                openCustomModal('modal-setup-password');
            }
        }

        function verifyAndSavePassword() {
            const pwd1 = document.getElementById('setup-pwd-input-1').value;
            const pwd2 = document.getElementById('setup-pwd-input-2').value;

            if (pwd1.length < 4) {
                showToast("密碼安全長度請至少填寫 4 個字元！");
                return;
            }
            if (pwd1 !== pwd2) {
                showToast("兩次密碼輸入不一致，請重新檢查！");
                return;
            }

            window.cardData.adminPassword = pwd1;
            window.storedPassword = pwd1;

            uploadCardToFirestore();
            hideCustomModal('modal-setup-password');
        }

        async function uploadCardToFirestore() {
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('loading-text').innerText = "正在同步傳送至雲端儲存空間...";
            try {
                const docRef = window.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'cardData', 'mainProfile');
                await window.setDoc(docRef, window.cardData);
                showToast("同步成功！全球皆可即時讀取新內容！");
                switchToViewMode();
            } catch (e) {
                console.error("雲端更新失敗: ", e);
                showToast("儲存失敗！請檢查 Firebase 規則與連線。");
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        function triggerUnlockModal() {
            if (!window.storedPassword) return; 
            document.getElementById('verify-pwd-input').value = '';
            openCustomModal('modal-verify-password');
        }

        function confirmVerifyPassword() {
            const inputVal = document.getElementById('verify-pwd-input').value;
            if (inputVal === window.storedPassword) {
                hideCustomModal('modal-verify-password');
                switchToEditMode(); 
            } else {
                showToast("密碼輸入錯誤，驗證失敗！");
            }
        }

        function openCustomModal(id) {
            const modalEl = document.getElementById(id);
            const cardBox = modalEl.querySelector('div');
            modalEl.classList.remove('hidden');
            setTimeout(() => {
                modalEl.classList.remove('opacity-0');
                cardBox.classList.remove('scale-95');
                cardBox.classList.add('scale-100');
            }, 15);
        }

        function hideCustomModal(id) {
            const modalEl = document.getElementById(id);
            const cardBox = modalEl.querySelector('div');
            modalEl.classList.add('opacity-0');
            cardBox.classList.remove('scale-100');
            cardBox.classList.add('scale-95');
            setTimeout(() => {
                modalEl.classList.add('hidden');
            }, 300);
        }

        function showToast(msg) {
            const toast = document.getElementById('custom-toast');
            document.getElementById('toast-message').innerText = msg;
            toast.classList.remove('pointer-events-none', 'opacity-0');
            toast.classList.add('opacity-100');
            toast.style.transform = 'translate(-50%, 0px)';
            
            setTimeout(() => {
                toast.classList.add('pointer-events-none', 'opacity-0');
                toast.classList.remove('opacity-100');
                toast.style.transform = 'translate(-50%, -50px)';
            }, 3500);
        }
    </script>
</body>
</html>
