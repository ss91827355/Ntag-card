    <!-- Firebase SDK 核心模組 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { initializeFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 🟢 使用您的專屬 Firebase 設定參數
        const firebaseConfig = {
          apiKey: "AIzaSyAU4q55DkXYlNmmGGMJVYXB6v2saQJTIaQ",
          authDomain: "ntag-card.firebaseapp.com",
          projectId: "ntag-card",
          storageBucket: "ntag-card.firebasestorage.app",
          messagingSenderId: "163482004228",
          appId: "1:163482004228:web:e1280f3bff817d28a13e51"
        };

        const appId = "ss91827355-ntag-card"; 

        // 初始化狀態與全域變數
        window.cardData = {
            avatarSource: 'ig',
            avatarCustomBase64: '',
            idLine: '',
            idIg: '',
            idFb: '',
            name: '',
            title: '',
            bio: '',
            phone: '',
            address: '',
            bgImage: '',
            adminPassword: ''
        };
        window.storedPassword = "";

        // 全域函數綁定
        window.triggerSaveFlow = triggerSaveFlow;
        window.verifyAndSavePassword = verifyAndSavePassword;
        window.confirmVerifyPassword = confirmVerifyPassword;
        window.triggerUnlockModal = triggerUnlockModal;
        window.compressAndUploadBackground = compressAndUploadBackground;
        window.compressAndUploadAvatar = compressAndUploadAvatar;
        window.handleAvatarSourceChange = handleAvatarSourceChange;
        window.updateSocialPreview = updateSocialPreview;
        window.hideCustomModal = hideCustomModal;
        window.suggestTitleWithAI = suggestTitleWithAI;
        window.optimizeBioWithAI = optimizeBioWithAI;

        let app, auth, db;

        // 連線逾時防護定時器
        const failsafeTimer = setTimeout(() => {
            document.getElementById('loading-overlay').classList.add('hidden');
            showToast("⚠️ 雲端資料庫連線逾時！將預先進入編輯模式。請檢查 Firebase 控制台的驗證設定。");
            switchToEditMode();
        }, 8500);

        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            
            // 強制開啟 HTTP Long-polling，避開 Brave 等安全瀏覽器對 WebSocket 的隱私攔截
            db = initializeFirestore(app, {
                experimentalForceLongPolling: true
            });

            window.db = db;
            window.doc = doc;
            window.setDoc = setDoc;

            initAuthAndFetch();
        } catch (e) {
            console.error("Firebase 初始化失敗:", e);
            clearTimeout(failsafeTimer);
            document.getElementById('loading-overlay').classList.add('hidden');
            showToast("Firebase 初始化異常，請確認設定檔參數是否填寫正確。");
            switchToEditMode();
        }

        // 登入驗證與資料監聽
        async function initAuthAndFetch() {
            try {
                // 1. 匿名登入
                const userCredential = await signInAnonymously(auth);
                const user = userCredential.user;

                if (!user) throw new Error("Anonymous Auth Failed");

                // 2. 開啟 Firestore 即時監聽 (路徑嚴格遵循 RULE 1)
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'cardData', 'mainProfile');
                
                onSnapshot(docRef, (docSnap) => {
                    clearTimeout(failsafeTimer);
                    document.getElementById('loading-overlay').classList.add('hidden');
                    
                    if (docSnap.exists()) {
                        window.cardData = docSnap.data();
                        window.storedPassword = window.cardData.adminPassword || "";
                        applyCardBackground(window.cardData.bgImage);
                        switchToViewMode();
                    } else {
                        // 雲端無任何文件時，初始化空白資料
                        switchToEditMode();
                    }
                }, (error) => {
                    console.error("Firestore 監聽失敗 (請確認安全性規則已開啟為允許讀寫):", error);
                    clearTimeout(failsafeTimer);
                    document.getElementById('loading-overlay').classList.add('hidden');
                    // 🚨 精準報錯可視化：把 Firestore 的真實錯誤代碼呈現在畫面上
                    showToast("讀取失敗！錯誤代碼: " + (error.code || "unknown") + " | " + error.message);
                    switchToEditMode();
                });

            } catch (err) {
                console.error("安全登入認證失敗:", err);
                clearTimeout(failsafeTimer);
                document.getElementById('loading-overlay').classList.add('hidden');
                // 🚨 精準報錯可視化
                showToast("登入授權被拒！錯誤代碼: " + (err.code || "unknown") + " | " + err.message);
                switchToEditMode();
            }
        }

        // ================= ✨ Gemini API LLM 模組 =================
        async function fetchGeminiWithRetry(payload, retries = 5, delay = 1000) {
            const apiKey = ""; // 執行環境自動注入
            const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=" + apiKey;
            
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (e) {
                    // 自動進行重試
                }
                if (i < retries - 1) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
            throw new Error("無法與 AI 伺服器建立穩定連線，請稍後再試。");
        }

        async function suggestTitleWithAI() {
            const nameInput = document.getElementById('edit-name');
            const bioInput = document.getElementById('edit-bio');
            const titleInput = document.getElementById('edit-title');
            
            const name = nameInput.value.trim() || "專業人士";
            const currentBio = bioInput.value.trim();
            const currentTitle = titleInput.value.trim();

            if (!currentBio && !currentTitle) {
                showToast("💡 請先填寫姓名或個人簡介，以便 AI 為您量身打造適合的亮點頭銜！");
                return;
            }

            const btn = document.getElementById('ai-title-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> 構思中...';
            btn.disabled = true;

            const promptText = "請根據以下資訊，為名為「" + name + "」的專業人士，構思一個適合放在 NFC 行動電子名片上的「專業職稱與定位頭銜」（可包含學位或核心能力，例如「資深專案經理 / 產品設計師」、「藥理學碩士 / 專業連鎖藥師」）。\n\n當前職稱：「" + currentTitle + "」\n當前簡介：「" + currentBio + "」\n\n請直接提供 1 個最合適、簡短有質感的頭銜，使用繁體中文，且「絕對不要」包含任何引號、解釋或多餘的前後贅字。";

            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                systemInstruction: { parts: [{ text: "你是一位頂尖的職涯發展顧問，擅長用最簡練且具商業吸引力的文字，為專業人士提煉出個人品牌定位職稱。" }] }
            };

            try {
                const result = await fetchGeminiWithRetry(payload);
                const suggestedTitle = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (suggestedTitle) {
                    titleInput.value = suggestedTitle.trim();
                    showToast("✨ AI 職稱與頭銜構思完成！");
                } else {
                    throw new Error("解析失敗");
                }
            } catch (e) {
                console.error(e);
                showToast("AI 構思失敗: " + e.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function optimizeBioWithAI() {
            const nameInput = document.getElementById('edit-name');
            const titleInput = document.getElementById('edit-title');
            const bioInput = document.getElementById('edit-bio');
            
            const name = nameInput.value.trim() || "名片主";
            const title = titleInput.value.trim() || "專業人士";
            const currentBio = bioInput.value.trim();

            const btn = document.getElementById('ai-bio-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> 優化中...';
            btn.disabled = true;

            let promptText = "";
            if (!currentBio) {
                promptText = "請為名為「" + name + "」，職位為「" + title + "」的專業人士，撰寫一份大約 80 至 130 字的行動名片個人簡介與經歷草稿，語氣需要顯得沉穩、專業且具有親和力。請使用繁體中文回答，直接輸出內容，不要任何多餘的解釋。";
            } else {
                promptText = "請優化以下個人簡介與學經歷，使其看起來更具備專業商務感、邏輯結構得體，並維持字數精煉以適合行動名片閱讀：\n\n\"" + currentBio + "\"\n\n請使用繁體中文，直接輸出優化後的內容，不要有任何多餘的引號、引言或解釋。";
            }

            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                systemInstruction: { parts: [{ text: "你是一位頂尖的個人品牌顧問與文案專家，專長是將零散的學經歷資訊潤飾、優化成高質感、吸引人的職涯簡介。" }] }
            };

            try {
                const result = await fetchGeminiWithRetry(payload);
                const optimizedBio = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (optimizedBio) {
                    bioInput.value = optimizedBio.trim();
                    showToast("✨ AI 個人簡歷文案美化成功！");
                } else {
                    throw new Error("解析失敗");
                }
            } catch (e) {
                console.error(e);
                showToast("AI 美化失敗: " + e.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ================= 圖片前端壓縮引擎 (頭像限制100px / 背景限制700px) =================
        function compressImage(file, maxWidth, maxHeight, callback) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 採用極限 40% 品質壓縮，防止檔案過大導致寫入被拒絕
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.4);
                    callback(compressedDataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function compressAndUploadAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                compressImage(file, 100, 100, function(compressedBase64) {
                    window.cardData.avatarCustomBase64 = compressedBase64;
                    document.getElementById('edit-avatar-preview').src = compressedBase64;
                    document.getElementById('avatar-status-text').innerText = "大頭貼已成功優化壓縮";
                    document.getElementById('avatar-status-text').className = "text-[11px] text-green-400 font-medium";
                });
            }
        }

        function compressAndUploadBackground(event) {
            const file = event.target.files[0];
            if (file) {
                compressImage(file, 700, 700, function(compressedBase64) {
                    window.cardData.bgImage = compressedBase64;
                    applyCardBackground(compressedBase64);
                    showToast("自訂背景載入成功，請完成編輯後儲存！");
                });
            }
        }

        function applyCardBackground(bgData) {
            const bodyBg = document.getElementById('body-bg');
            if (bgData && bgData.startsWith('data:image')) {
                bodyBg.style.backgroundImage = "url('" + bgData + "')";
            } else {
                bodyBg.style.backgroundImage = 'none';
            }
        }

        function handleAvatarSourceChange() {
            const source = document.getElementById('avatar-source-select').value;
            window.cardData.avatarSource = source;
            
            const uploadLabel = document.getElementById('avatar-upload-input-label');
            const statusLabel = document.getElementById('avatar-status-text');

            if (source === 'upload') {
                uploadLabel.classList.remove('hidden');

                    statusLabel.innerText = "請點選按鈕上傳照片";
                    statusLabel.className = "text-[11px] text-white/30";

                uploadLabel.classList.add('hidden');

        // ================= 模式切換與渲染 =================
        function switchToViewMode() {

        function renderViewData() {

                { id: window.cardData.idIg, name: 'Instagram 追蹤', prefix: 'https://instagram.com/', icon: 'fab fa-instagram', color: '#E1306C' },

        function verifyAndSavePassword() {
            const pwd1 = document.getElementById('setup-pwd-input-1').value;
            const pwd2 = document.getElementById('setup-pwd-input-2').value;

            if (pwd1.length < 4) {
                showToast("密碼安全長度請至少填寫 4 個字元！");
                return;
            }
            if (pwd1 !== pwd2) {
                showToast("兩次密碼輸入不一致，請重新檢查！");
                return;
            }

            window.cardData.adminPassword = pwd1;

        async function uploadCardToFirestore() {
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('loading-text').innerText = "正在將資料與相片同步至雲端...";
            try {
                const docRef = window.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'cardData', 'mainProfile');
                await window.setDoc(docRef, window.cardData);
                showToast("同步成功！全球皆可即時讀取新內容！");
                switchToViewMode();
            } catch (e) {
                console.error("雲端更新失敗: ", e);
                // 🚨 精準錯誤輸出：直接呈現錯誤代碼（如 permission-denied 等），方便使用者在 Firestore Console 修正規則
                showToast("儲存失敗！錯誤詳情: " + (e.code || "unknown") + " | " + e.message);
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden');
            }

        function triggerUnlockModal() {
            if (!window.storedPassword) return; 
            document.getElementById('verify-pwd-input').value = '';
            openCustomModal('modal-verify-password');

        function confirmVerifyPassword() {
            const inputVal = document.getElementById('verify-pwd-input').value;
            if (inputVal === window.storedPassword) {
                hideCustomModal('modal-verify-password');

        function openCustomModal(id) {
            const modalEl = document.getElementById(id);
            const cardBox = modalEl.querySelector('div');
            modalEl.classList.remove('hidden');
            setTimeout(() => {
                modalEl.classList.remove('opacity-0');
                cardBox.classList.remove('scale-95');
                cardBox.classList.add('scale-100');
            }, 15);
        }

        function hideCustomModal(id) {
            const modalEl = document.getElementById(id);
            const cardBox = modalEl.querySelector('div');
            modalEl.classList.add('opacity-0');
            cardBox.classList.remove('scale-100');
            cardBox.classList.add('scale-95');
            setTimeout(() => {
                modalEl.classList.add('hidden');
            }, 300);
        }

        function showToast(msg) {
            const toast = document.getElementById('custom-toast');
            document.getElementById('toast-message').innerText = msg;
            toast.classList.remove('pointer-events-none', 'opacity-0');
            toast.classList.add('opacity-100');
            toast.style.transform = 'translate(-50%, 0px)';
            
            setTimeout(() => {
                toast.classList.add('pointer-events-none', 'opacity-0');
                toast.classList.remove('opacity-100');
                toast.style.transform = 'translate(-50%, -50px)';
            }, 4500); // 延長顯示時間，便於記錄詳細錯誤
        }
    </script>
